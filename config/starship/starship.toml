"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

command_timeout = 2000 # Timeout for commands in milliseconds

format = """
$os\
$username\
$directory\
$git_branch\
$git_commit\
$git_status\
$git_metrics\
$git_state\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$package\
$docker_context\
$kubernetes\
$shell\
$container\
$jobs\
$time\
$line_break\
$character\
"""

right_format = """
$cmd_duration\
$status\
"""

palette = 'default'

[palettes.default]

color_ok = 'bright-green'
color_danger = 'bright-red'
color_caution = 'bright-yellow'
color_os = 'red'
color_username = 'red'
color_directory = 'yellow'
color_git = 'cyan'
color_git_added = 'bright-green'
color_git_deleted = 'bright-red'
color_env = 'blue'
color_kubernetes = 'purple'
color_docker = 'blue'
color_shell = ''
color_container = ''
color_other = ''
color_time = ''
color_duration = ''
color_vimcmd_ok = 'green'
color_vimcmd_replace = 'purple'
color_vimcmd_visual = 'yellow'

[character]
success_symbol = '[Ô×£](green)'
error_symbol = '[Ô×£](red)'
vimcmd_symbol = '[Ô×£](color_vimcmd_ok)'
vimcmd_replace_one_symbol = '[Ô×£](color_vimcmd_replace)'
vimcmd_visual_symbol = '[Ô×£](color_vimcmd_visual)'

[os]
disabled = true # I don't need to know the OS I'm using
style = "fg:color_os"
format = '[$symbol]($style)'

[os.symbols]
Windows = "¾░ì▓"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
Manjaro = "´îÆ"
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
Arch = "¾░úç"
Artix = "¾░úç"
EndeavourOS = "´åù"
CentOS = "´îä"
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
Pop = "´î¬"

[username]
show_always = false
style_user = "fg:color_username"
style_root = "bold fg:color_danger"
format = '[ $user ]($style)'

[battery]
disabled = true # I can keep my eyes on the battery level by my own

[time]
disabled = true # I find this kinda useless
time_format = "%R"
format = '[¾░öø $time ]($style)'

[cmd_duration]
disabled = false
min_time = 2000
format = '[took ¾▒½æ $duration ]($style)'
show_milliseconds = false

[git_branch]
symbol = "¯£Ñ"
format = 'on [$symbol $branch]($style):'
only_attached = true
truncation_length = 25
truncation_symbol = "..."
always_show_remote = false

[git_status]
disabled = false
format = '[\[($ahead_behind)($all_status)\]]($style) '
stashed = "*${count}"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
up_to_date = ""
diverged = "Ôçí${ahead_count}Ôçú${behind_count}"
deleted = "├ù${count}"
conflicted = "=${count}"
renamed = "┬╗${count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"

[git_state]
disabled = false
format = '[($state( $progress_current/$progress_total) )]($style bold)'
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"

[git_commit]
disabled = false
tag_disabled = false
only_detached = true
tag_symbol = ' '
commit_hash_length = 7
format = '[\($hash$tag\)]($style) '

[git_metrics]
disabled = true
format = '[(([+$added]($added_style))([-$deleted]($deleted_style)) )](fg:color_git)'
added_style = "fg:color_git_added"
deleted_style = "fg:color_git_deleted"
only_nonzero_diffs = true

[shell]
disabled = true
zsh_indicator = "¾░èá"
style = "green bold"

[status]
disabled = false
symbol = "´æº "
success_symbol = ""
not_executable_symbol = "¯»û "
map_symbol = false

[directory]
read_only = "´ôö "
truncation_length = 4
format = '[$path ]($style)'
truncate_to_repo = true

[memory_usage]
disabled = true
symbol = "¾░ìø "

[hostname]
ssh_only = true
ssh_symbol = "¯¼ü "

[kubernetes]
disabled = false
symbol = "¾▒â¥"
format = 'in [$symbol $context\($namespace\)]($style) '
style = 'fg:color_kubernetes'

[kubernetes.context_aliases]
'arn:aws:eks:.*:.*:cluster/(?P<name>.*)' = '$name'
'gke_.*_(?P<name>.+)' = '$name'

[[kubernetes.contexts]]
context_pattern = '.*prod.*'
symbol = '¾▒â¥ '
style = 'bold fg:color_danger'

[[kubernetes.contexts]]
context_pattern = '.*staging.*'
symbol = '¾▒â¥ '
style = 'bold fg:color_caution'

