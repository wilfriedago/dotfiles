[appearance]
spacing = "compact"

[appearance.themes]
system_theme = false
theme = "dark"

[appearance.vertical_tabs]
enabled = false

[appearance.text]
notebook_font_size = 14.0
font_size = 13.0
font_name = "DankMono Nerd Font"
ai_font_name = "DankMono Nerd Font"
match_ai_font = false
ligature_rendering_enabled = true

[appearance.icon]
app_icon = "classic_3"

[appearance.window]
override_opacity = 90

[appearance.panes]
should_dim_inactive_panes = true

[code]

[code.editor]
show_code_review_button = false
show_project_explorer = false
show_global_search = false

[warp_drive]
enabled = false

[agents]

[agents.third_party]
should_render_cli_agent_toolbar = false

[agents.warp_agent]
is_any_ai_enabled = false

[agents.warp_agent.other]
show_agent_notifications = true

[text_editing]
vim_mode_enabled = true

[notifications]
toast_duration_secs = 8

[notifications.preferences]
is_agent_task_completed_enabled = true
is_long_running_enabled = true
is_needs_attention_enabled = true
is_password_prompt_enabled = true
long_running_threshold = 30
mode = "enabled"
play_notification_sound = true

[privacy]
telemetry_enabled = false
crash_reporting_enabled = false

[general]
login_item = false
show_warning_before_quitting = false
quit_on_last_window_closed = true

[terminal]
use_audible_bell = true
